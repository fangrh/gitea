<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDS Viewer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@10/dist/ol.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; height: 100vh; background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
#sidebar { width: 220px; background: #1e1e2e; color: #cdd6f4; overflow-y: auto; padding: 12px; flex-shrink: 0; }
#sidebar h4 { margin: 0 0 8px 0; color: #89b4fa; font-size: 13px; }
#sidebar button { width: 100%; margin-bottom: 8px; padding: 6px 10px; background: #45475a; color: #cdd6f4; border: 1px solid #585b70; border-radius: 4px; cursor: pointer; font-size: 12px; }
#sidebar button:hover { background: #585b70; }
#map-container { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#map { flex: 1; min-height: 300px; }
#console { height: 200px; background: #11111b; color: #cdd6f4; font: 13px/1.5 'Cascadia Code', 'Fira Code', 'Consolas', monospace; overflow-y: auto; border-top: 2px solid #313244; flex-shrink: 0; transition: height 0.15s; }
#console.collapsed { height: 32px; overflow-y: hidden; }
#console-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; background: #181825; border-bottom: 1px solid #313244; cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 1; }
#console-header span { font-size: 12px; font-weight: 600; color: #89b4fa; }
#console-header button { padding: 3px 10px; background: #45475a; color: #cdd6f4; border: 1px solid #585b70; border-radius: 3px; cursor: pointer; font-size: 11px; font-family: inherit; }
#console-header button:hover { background: #585b70; }
#console-header button.copied { background: #1a6640; border-color: #2e8b57; }
#console-body { padding: 8px 12px; }
#console-body .kv { display: flex; gap: 8px; padding: 1px 0; }
#console-body .kv .key { color: #6c7086; min-width: 90px; flex-shrink: 0; text-align: right; }
#console-body .kv .val { color: #cdd6f4; word-break: break-all; }
#console-body .kv .val.hl { color: #f9e2af; }
#console-body .placeholder { color: #585b70; font-style: italic; padding: 20px 0; text-align: center; }
.file-item { padding: 6px 8px; cursor: pointer; border-radius: 4px; margin-bottom: 2px; font-size: 13px; word-break: break-all; }
.file-item:hover { background: #313244; }
.file-item.active { background: #45475a; }
.legend-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 12px; cursor: pointer; }
.swatch { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }
.swatch.hidden { opacity: 0.2; }
.tab-btn { padding: 2px 8px; border-radius: 4px 4px 0 0; cursor: pointer; font-size: 11px; color: #6c7086; border-bottom: 2px solid transparent; }
.tab-btn.active { color: #89b4fa; border-bottom-color: #89b4fa; }
.tab-btn:hover { color: #cdd6f4; }
#source-panel { height: 100%; overflow-y: auto; }
.src-line { display: flex; font: 12px/1.6 'Cascadia Code', 'Fira Code', 'Consolas', monospace; padding: 0 8px; margin: 0; }
.src-line.hl { background: rgba(250, 200, 80, 0.15); border-left: 3px solid #f9e2af; }
.src-line .ln { color: #585b70; min-width: 44px; text-align: right; padding-right: 12px; user-select: none; flex-shrink: 0; }
.src-line .code { color: #cdd6f4; white-space: pre; overflow-x: auto; }
</style>
</head>
<body>
<div id="sidebar">
    <h4>GDS Files</h4>
    <button onclick="fitView()">Fit View</button>
    <div id="file-list"><p style="color:#6c7086;font-size:13px;">Loading...</p></div>
</div>
<div id="map-container">
    <div id="map"></div>
    <div id="console">
        <div id="console-header">
            <span style="display:flex;align-items:center;gap:2px;">
                <span class="tab-btn active" data-tab="info" onclick="switchTab(event, 'info')">Info</span>
                <span class="tab-btn" data-tab="source" onclick="switchTab(event, 'source')">Source</span>
            </span>
            <span style="display:flex;align-items:center;gap:6px;">
                <button id="copy-btn" onclick="copyYAML(event)" title="Copy as YAML">Copy YAML</button>
                <span onclick="toggleConsole()" title="Collapse" style="cursor:pointer;color:#6c7086;font-size:14px;">&#9660;</span>
            </span>
        </div>
        <div id="console-body">
            <div id="info-panel"><p class="placeholder">Click a polygon to inspect</p></div>
            <div id="source-panel" style="display:none;"><p class="placeholder">Click a polygon, then switch to Source tab to view code</p></div>
        </div>
    </div>
</div>

<script>
var params = new URLSearchParams(window.location.search);
var repo = params.get('repo') || '';
var branch = params.get('branch') || 'main';
var currentFilePath = '';
var selectedFeature = null;
var currentProvenance = {};  // {file, line} for source tab
var activeTab = 'info';

var source = new ol.source.Vector();

// Highlight style for selected feature
var highlightStyle = new ol.style.Style({
    stroke: new ol.style.Stroke({ color: '#ffffff', width: 3 }),
    fill: new ol.style.Fill({ color: 'rgba(255,255,255,0.3)' })
});

var vectorLayer = new ol.layer.Vector({
    source: source,
    style: function(feature) {
        var selected = feature.get('selected');
        if (selected) return highlightStyle;
        var color = feature.get('color') || '#fff';
        var visible = feature.get('visible') !== false;
        if (!visible) return new ol.style.Style({});
        return new ol.style.Style({
            stroke: new ol.style.Stroke({ color: color, width: 1 }),
            fill: new ol.style.Fill({ color: color + '80' })
        });
    }
});

var map = new ol.Map({
    target: 'map',
    layers: [vectorLayer],
    view: new ol.View({ center: [0, 0], zoom: 0, minZoom: -20, maxZoom: 40 }),
    controls: [new ol.control.Zoom()]
});

// Select interaction
var selectClick = new ol.interaction.Select({
    layers: [vectorLayer],
    style: null  // use layer style function
});
map.addInteraction(selectClick);

selectClick.on('select', function(e) {
    if (e.selected.length > 0) {
        var f = e.selected[0];
        // Deselect previous
        if (selectedFeature && selectedFeature !== f) {
            selectedFeature.set('selected', false);
        }
        selectedFeature = f;
        f.set('selected', true);
        showInspect(f);
    } else {
        if (selectedFeature) {
            selectedFeature.set('selected', false);
            selectedFeature = null;
        }
        clearInspect();
    }
    vectorLayer.changed();
});

var allFeatures = [];
var layerColors = {};
var allProvenance = {};  // global provenance by cell name

function fitView() {
    var extent = source.getExtent();
    if (extent && isFinite(extent[0])) {
        map.getView().fit(extent, { padding: [40, 40, 40, 40], duration: 300 });
    }
}

function loadGDS(filePath) {
    currentFilePath = filePath;
    fetch('/data?repo=' + encodeURIComponent(repo) + '&ref=' + branch + '&path=' + encodeURIComponent(filePath))
        .then(function(r) { if (!r.ok) throw Error('HTTP ' + r.status); return r.json(); })
        .then(function(geojson) {
            source.clear();
            allFeatures = [];
            layerColors = {};
            allProvenance = {};
            geojson.features.forEach(function(feature) {
                var layerId = feature.properties.layer;
                var dataType = feature.properties.data_type;
                var color = feature.properties.color;
                var key = layerId + '/' + dataType;
                layerColors[key] = color;
                // Merge global provenance
                var provByCell = feature.properties.provenance_by_cell;
                if (provByCell) {
                    for (var cn in provByCell) {
                        if (provByCell.hasOwnProperty(cn)) allProvenance[cn] = provByCell[cn];
                    }
                }
                var polys = feature.geometry.coordinates;
                polys.forEach(function(polygon) {
                    polygon.forEach(function(ring) {
                        var geom = new ol.geom.Polygon([ring]);
                        var f = new ol.Feature({ geometry: geom });
                        f.set('layer', key);
                        f.set('color', color);
                        f.set('layerKey', key);
                        f.set('visible', true);
                        f.set('selected', false);
                        // Attach provenance for this layer
                        f.set('provByCell', provByCell || {});
                        // Polygon metadata
                        f.set('meta', polyMeta(ring));
                        allFeatures.push(f);
                        source.addFeature(f);
                    });
                });
            });
            if (allFeatures.length > 0) fitView();
            clearInspect();
            buildLegend();
        }).catch(function(e) { console.error('Load failed: ' + e.message); });
}

function polyMeta(ring) {
    var xs = ring.map(function(p) { return p[0]; });
    var ys = ring.map(function(p) { return p[1]; });
    var area = 0;
    for (var i = 0; i < xs.length - 1; i++) area += xs[i] * ys[i+1] - xs[i+1] * ys[i];
    area = Math.abs(area) / 2;
    return {
        area_um2: Math.round(area * 1e4) / 1e4,
        vertex_count: ring.length - 1,
        bbox: [min(xs), min(ys), max(xs), max(ys)]
    };
}

function min(arr) { return arr.reduce(function(a, b) { return Math.min(a, b); }); }
function max(arr) { return arr.reduce(function(a, b) { return Math.max(a, b); }); }

function buildLegend() {
    var existing = document.querySelector('.legend-section');
    if (existing) existing.remove();
    var keys = Object.keys(layerColors);
    if (!keys.length) return;
    var div = document.createElement('div');
    div.className = 'legend-section';
    div.style.marginTop = '12px';
    div.innerHTML = '<h4 style="margin:0 0 6px 0;color:#89b4fa;">Layers</h4>';
    keys.forEach(function(key) {
        var row = document.createElement('div');
        row.className = 'legend-row';
        row.innerHTML = '<span class="swatch" style="background:' + layerColors[key] + ';" data-key="' + key + '"></span> ' + key;
        row.onclick = function() {
            var swatch = row.querySelector('.swatch');
            var hidden = swatch.classList.toggle('hidden');
            allFeatures.forEach(function(f) { if (f.get('layerKey') === key) f.set('visible', !hidden); });
            vectorLayer.changed();
        };
        div.appendChild(row);
    });
    document.getElementById('sidebar').appendChild(div);
}

// --- Console panel ---

function showInspect(feature) {
    var layer = feature.get('layer') || '?';
    var provByCell = feature.get('provByCell') || {};
    var meta = feature.get('meta') || {};
    var bbox = meta.bbox || [];

    // Build info panel
    var panel = document.getElementById('info-panel');
    panel.innerHTML = '';
    var d = frag();
    addKV(d, 'layer', layer);
    addKV(d, 'area', (meta.area_um2 || '?') + ' um2');
    addKV(d, 'bbox', '[' + bbox.map(function(v) { return v.toFixed(4); }).join(', ') + ']');
    addKV(d, 'vertices', String(meta.vertex_count || '?'));

    var cellNames = Object.keys(provByCell);
    if (cellNames.length > 0) {
        addSep(d);
        cellNames.forEach(function(cn) {
            var p = provByCell[cn];
            addKV(d, 'cell', cn, true);
            if (p.file) addKV(d, 'file', p.file + ':' + p.line);
            if (p.function && p.function !== '<module>') addKV(d, 'function', p.function + '()');
            if (p.class_name) addKV(d, 'class', p.class_name);
            if (p.call_index) addKV(d, 'call_index', String(p.call_index));
        });
    }

    addSep(d);
    addKV(d, 'repo', repo);
    addKV(d, 'ref', branch);
    addKV(d, 'path', currentFilePath);
    panel.appendChild(d);

    // Store first provenance entry for source tab
    var firstCell = cellNames[0];
    if (firstCell && provByCell[firstCell].file) {
        currentProvenance = provByCell[firstCell];
    } else {
        currentProvenance = {};
    }

    // Update source panel placeholder based on provenance availability
    var sp = document.getElementById('source-panel');
    if (!currentProvenance.file) {
        sp.innerHTML = '<p class="placeholder">No provenance data in this GDS file.<br><small style="color:#585b70;">Rebuild the GDS with the latest gdsfactory to enable source inspection.</small></p>';
    }

    // If source tab is active, reload it
    if (activeTab === 'source') {
        loadSource();
    }
}

function clearInspect() {
    document.getElementById('info-panel').innerHTML = '<p class="placeholder">Click a polygon to inspect</p>';
    document.getElementById('source-panel').innerHTML = '<p class="placeholder">Click a polygon, then switch to Source tab to view code<br><small style="color:#585b70;">Requires provenance data embedded in the GDS file.</small></p>';
    currentProvenance = {};
}

function switchTab(e, tab) {
    e.stopPropagation();
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(function(b) {
        b.classList.toggle('active', b.dataset.tab === tab);
    });
    document.getElementById('info-panel').style.display = tab === 'info' ? '' : 'none';
    document.getElementById('source-panel').style.display = tab === 'source' ? '' : 'none';
    if (tab === 'source' && currentProvenance.file) {
        loadSource();
    }
}

function loadSource() {
    var panel = document.getElementById('source-panel');
    panel.innerHTML = '<p class="placeholder" style="padding:12px;">Loading...</p>';

    // Normalize Windows backslash paths to forward slashes for git
    var filePath = (currentProvenance.file || '').replace(/\\/g, '/');
    var url = '/source?repo=' + encodeURIComponent(repo) + '&ref=' + branch
        + '&path=' + encodeURIComponent(filePath);

    fetch(url).then(function(r) {
        if (!r.ok) throw Error('HTTP ' + r.status);
        return r.text();
    }).then(function(code) {
        var lines = code.split('\n');
        var targetLine = currentProvenance.line ? parseInt(currentProvenance.line) : -1;
        var html = '';
        for (var i = 0; i < lines.length; i++) {
            var ln = i + 1;
            var cls = (ln === targetLine) ? 'src-line hl' : 'src-line';
            html += '<div class="' + cls + '"><span class="ln">' + ln + '</span><span class="code">' + esc(lines[i]) + '</span></div>';
        }
        panel.innerHTML = html;

        // Auto-scroll to highlighted line
        if (targetLine > 0) {
            var hlEl = panel.querySelector('.src-line.hl');
            if (hlEl) {
                hlEl.scrollIntoView({ block: 'center', behavior: 'smooth' });
            }
        }
    }).catch(function(e) {
        console.error('loadSource failed:', url, e);
        panel.innerHTML = '<p class="placeholder">Failed to load source: ' + esc(e.message)
            + '<br><small style="color:#6c7086;">' + esc(filePath) + '</small></p>';
    });
}

function addKV(parent, key, val, hl) {
    var row = document.createElement('div');
    row.className = 'kv';
    row.innerHTML = '<span class="key">' + esc(key) + '</span><span class="val' + (hl ? ' hl' : '') + '">' + esc(val) + '</span>';
    parent.appendChild(row);
}

function addSep(parent) {
    var sep = document.createElement('div');
    sep.style.cssText = 'height:1px;background:#313244;margin:4px 0;';
    parent.appendChild(sep);
}

function frag() { return document.createDocumentFragment(); }
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function toggleConsole() {
    var c = document.getElementById('console');
    var icon = document.querySelector('#console-header span[title="Collapse"]');
    c.classList.toggle('collapsed');
    if (icon) {
        icon.innerHTML = c.classList.contains('collapsed') ? '&#9654;' : '&#9660;';
    }
}

function copyYAML(e) {
    e.stopPropagation();
    if (!selectedFeature) return;

    var layer = selectedFeature.get('layer') || '?';
    var provByCell = selectedFeature.get('provByCell') || {};
    var meta = selectedFeature.get('meta') || {};
    var bbox = (meta.bbox || []).map(function(v) { return v.toFixed(4); });

    var lines = [
        'layer: ' + layer,
        'area_um2: ' + (meta.area_um2 || ''),
        'bbox: [' + bbox.join(', ') + ']',
        'vertex_count: ' + (meta.vertex_count || ''),
        'repo: ' + repo,
        'ref: ' + branch,
        'path: ' + currentFilePath
    ];

    Object.keys(provByCell).forEach(function(cn) {
        var p = provByCell[cn];
        lines.push('');
        lines.push('cell: ' + cn);
        if (p.file) lines.push('file: ' + p.file);
        if (p.line) lines.push('line: ' + p.line);
        if (p.function && p.function !== '<module>') lines.push('function: ' + p.function);
        if (p.class_name) lines.push('class_name: ' + p.class_name);
        if (p.call_index) lines.push('call_index: ' + p.call_index);
    });

    var yaml = lines.join('\n');
    copyToClipboard(yaml);
}

function copyToClipboard(text) {
    var btn = document.getElementById('copy-btn');
    // Try modern Clipboard API first
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(function() { btn.textContent = 'Copy YAML'; btn.classList.remove('copied'); }, 2000);
        }).catch(function(err) {
            console.error('Clipboard API failed:', err);
            fallbackCopy(text, btn);
        });
    } else {
        fallbackCopy(text, btn);
    }
}

function fallbackCopy(text, btn) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
        var ok = document.execCommand('copy');
        if (ok) {
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
        } else {
            btn.textContent = 'Failed';
        }
    } catch (e) {
        console.error('execCommand copy failed:', e);
        btn.textContent = 'Failed';
        // Last resort: show YAML in a prompt for manual copy
        showYamlPrompt(text);
    }
    document.body.removeChild(ta);
    setTimeout(function() { btn.textContent = 'Copy YAML'; btn.classList.remove('copied'); }, 2000);
}

function showYamlPrompt(text) {
    // Show YAML in the info panel as a selectable textarea
    var body = document.getElementById('info-panel');
    var pre = document.createElement('div');
    pre.style.cssText = 'background:#1e1e2e;padding:8px;border-radius:4px;margin-top:4px;white-space:pre-wrap;font:12px monospace;color:#cdd6f4;max-height:200px;overflow-y:auto;';
    pre.textContent = text;
    pre.setAttribute('contenteditable', 'false');
    var note = document.createElement('p');
    note.style.cssText = 'color:#f9e2af;font-size:11px;margin-top:4px;';
    note.textContent = 'Auto-copy blocked by browser. Select the text above and Ctrl+C to copy.';
    body.appendChild(pre);
    body.appendChild(note);
    setTimeout(function() {
        if (pre.parentNode) pre.parentNode.removeChild(pre);
        if (note.parentNode) note.parentNode.removeChild(note);
    }, 15000);
}

// --- File list ---
fetch('/files?repo=' + encodeURIComponent(repo) + '&ref=' + branch)
    .then(function(r) { return r.json(); })
    .then(function(files) {
        var list = document.getElementById('file-list');
        list.innerHTML = '';
        if (!files || !files.length) {
            list.innerHTML = '<p style="color:#6c7086;font-size:13px;">No .gds files found.</p>';
            return;
        }
        var firstProv = null, firstAny = null;
        files.forEach(function(entry) {
            var div = document.createElement('div');
            div.className = 'file-item';
            var fname = typeof entry === 'string' ? entry : (entry.name || entry);
            var hasProv = typeof entry === 'object' && entry.has_provenance;
            div.textContent = fname;
            if (hasProv) div.innerHTML += ' <span style="color:#a6e3a1;font-size:10px;" title="Has provenance">&#9679;</span>';
            div.onclick = function() {
                document.querySelectorAll('.file-item.active').forEach(function(el) { el.classList.remove('active'); });
                div.classList.add('active');
                loadGDS(fname);
            };
            list.appendChild(div);
            if (hasProv && !firstProv) firstProv = div;
            if (!firstAny) firstAny = div;
        });
        var auto = firstProv || firstAny;
        if (auto) setTimeout(function() { auto.click(); }, 200);
    }).catch(function(e) { console.error('File list failed: ' + e.message); });
</script>
</body>
</html>
