<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDS Viewer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@10/dist/ol.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; height: 100vh; background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
#sidebar { width: 220px; background: #1e1e2e; color: #cdd6f4; overflow-y: auto; padding: 12px; flex-shrink: 0; }
#sidebar h4 { margin: 0 0 8px 0; color: #89b4fa; font-size: 13px; }
#sidebar button { width: 100%; margin-bottom: 8px; padding: 6px 10px; background: #45475a; color: #cdd6f4; border: 1px solid #585b70; border-radius: 4px; cursor: pointer; font-size: 12px; }
#sidebar button:hover { background: #585b70; }
#map-container { flex: 1; display: flex; flex-direction: column; min-width: 0; }
#console { height: 200px; background: #11111b; color: #cdd6f4; font: 13px/1.5 'Cascadia Code', 'Fira Code', 'Consolas', monospace; overflow-y: auto; border-top: 2px solid #313244; flex-shrink: 0; transition: height 0.15s; }
#console.collapsed { height: 32px; overflow-y: hidden; }
#console-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 12px; background: #181825; border-bottom: 1px solid #313244; cursor: pointer; user-select: none; position: sticky; top: 0; z-index: 1; }
#console-header span { font-size: 12px; font-weight: 600; color: #89b4fa; }
#console-header button { padding: 3px 10px; background: #45475a; color: #cdd6f4; border: 1px solid #585b70; border-radius: 3px; cursor: pointer; font-size: 11px; font-family: inherit; }
#console-header button:hover { background: #585b70; }
#console-header button.copied { background: #1a6640; border-color: #2e8b57; }
#console-body { padding: 8px 12px; }
#console-body .kv { display: flex; gap: 8px; padding: 1px 0; }
#console-body .kv .key { color: #6c7086; min-width: 90px; flex-shrink: 0; text-align: right; }
#console-body .kv .val { color: #cdd6f4; word-break: break-all; }
#console-body .kv .val.hl { color: #f9e2af; }
#console-body .placeholder { color: #585b70; font-style: italic; padding: 20px 0; text-align: center; }
.file-item { padding: 6px 8px; cursor: pointer; border-radius: 4px; margin-bottom: 2px; font-size: 13px; word-break: break-all; }
.file-item:hover { background: #313244; }
.file-item.active { background: #45475a; }
.legend-row { display: flex; align-items: center; gap: 6px; padding: 3px 0; font-size: 12px; cursor: pointer; }
.swatch { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }
.swatch.hidden { opacity: 0.2; }
.tab-btn { padding: 2px 8px; border-radius: 4px 4px 0 0; cursor: pointer; font-size: 11px; color: #6c7086; border-bottom: 2px solid transparent; }
.tab-btn.active { color: #89b4fa; border-bottom-color: #89b4fa; }
.tab-btn:hover { color: #cdd6f4; }
#source-panel { height: 100%; overflow-y: auto; }
.src-line { display: flex; font: 12px/1.6 'Cascadia Code', 'Fira Code', 'Consolas', monospace; padding: 0 8px; margin: 0; }
.src-line.hl { background: rgba(250, 200, 80, 0.15); border-left: 3px solid #f9e2af; }
.src-line .ln { color: #585b70; min-width: 44px; text-align: right; padding-right: 12px; user-select: none; flex-shrink: 0; }
.src-line .code { color: #cdd6f4; white-space: pre; overflow-x: auto; }
.ol-dragbox { border: 2px dashed #89b4fa !important; background-color: rgba(137,180,250,0.1) !important; }
.file-section { margin: 4px 0; border: 1px solid #313244; border-radius: 4px; }
.file-section-header { display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: #181825; cursor: pointer; user-select: none; font-size: 12px; }
.file-section-header:hover { background: #1e1e2e; }
.file-section-header .arrow { color: #585b70; font-size: 10px; transition: transform 0.15s; }
.file-section-header .arrow.open { transform: rotate(90deg); }
.file-section-header .fname { color: #89b4fa; }
.file-section-header .lines { color: #6c7086; margin-left: auto; }
.file-section-body { max-height: 0; overflow: hidden; transition: max-height 0.2s; }
.file-section-body.open { max-height: 400px; overflow-y: auto; }
/* Drawing toolbar */
#map-row { display: flex; flex: 1; min-height: 0; }
#draw-toolbar { width: 40px; background: #1e1e2e; border-left: 1px solid #313244; display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 4px; flex-shrink: 0; }
.tool-btn { width: 32px; height: 32px; background: transparent; border: 1px solid transparent; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #6c7086; padding: 0; }
.tool-btn:hover { background: #313244; color: #cdd6f4; }
.tool-btn.active { background: #45475a; color: #89b4fa; border-color: #89b4fa; }
.tool-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
<div id="sidebar">
    <h4>GDS Files</h4>
    <button onclick="fitView()">Fit View</button>
    <div id="file-list"><p style="color:#6c7086;font-size:13px;">Loading...</p></div>
</div>
<div id="map-container">
    <div id="map-row">
        <div id="map" style="flex:1;"></div>
        <div id="draw-toolbar">
            <button class="tool-btn active" data-mode="select" title="Select (1)" onclick="setMode('select')">
                <svg viewBox="0 0 24 24"><path d="M5 3l14 9-7 2-3 7z"/></svg>
            </button>
            <button class="tool-btn" data-mode="rectangle" title="Rectangle (2)" onclick="setMode('rectangle')">
                <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="1"/></svg>
            </button>
            <button class="tool-btn" data-mode="circle" title="Circle (3)" onclick="setMode('circle')">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
            </button>
            <button class="tool-btn" data-mode="line" title="Line (4)" onclick="setMode('line')">
                <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/></svg>
            </button>
            <button class="tool-btn" data-mode="polygon" title="Polygon (5)" onclick="setMode('polygon')">
                <svg viewBox="0 0 24 24"><path d="M12 3l9 7-3 10H6L3 10z"/></svg>
            </button>
            <div style="height:1px;width:24px;background:#313244;margin:4px 0;"></div>
            <button class="tool-btn" data-mode="delete" title="Delete drawn" onclick="deleteDrawn()">
                <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
            </button>
            <button class="tool-btn" data-mode="snap" title="Snap (S)" onclick="toggleSnap()">
                <svg viewBox="0 0 24 24"><path d="M6 16c0-3.3 2.7-6 6-6s6 2.7 6 6v3H6z"/><line x1="12" y1="3" x2="12" y2="7"/></svg>
            </button>
        </div>
    </div>
    <div id="console">
        <div id="console-header">
            <span style="display:flex;align-items:center;gap:2px;">
                <span class="tab-btn active" data-tab="info" onclick="switchTab(event, 'info')">Info</span>
                <span class="tab-btn" data-tab="source" onclick="switchTab(event, 'source')">Source</span>
            </span>
            <span style="display:flex;align-items:center;gap:6px;">
                <button id="copy-btn" onclick="copyYAML(event)" title="Copy as YAML">Copy YAML</button>
                <span onclick="toggleConsole()" title="Collapse" style="cursor:pointer;color:#6c7086;font-size:14px;">&#9660;</span>
            </span>
        </div>
        <div id="console-body">
            <div id="info-panel"><p class="placeholder">Click a polygon to inspect</p></div>
            <div id="source-panel" style="display:none;"><p class="placeholder">Click a polygon, then switch to Source tab to view code</p></div>
        </div>
    </div>
</div>

<script>
var params = new URLSearchParams(window.location.search);
var repo = params.get('repo') || '';
var branch = params.get('branch') || 'main';
var currentFilePath = '';
var selectedFeatures = new ol.Collection();
var ctrlPressed = false;
var activeTab = 'info';
var sourceCache = {};   // filePath -> source code string
var expandedFiles = {}; // filePath -> true/false

var currentMode = 'select';
var snapActive = false;
var drawInteractions = {};

var drawSource = new ol.source.Vector();

var drawStyleDefault = new ol.style.Style({
    stroke: new ol.style.Stroke({ color: '#f38ba8', width: 2, lineDash: [8, 4] }),
    fill: new ol.style.Fill({ color: 'rgba(243, 139, 168, 0.1)' })
});

var drawStyleSelected = new ol.style.Style({
    stroke: new ol.style.Stroke({ color: '#ffffff', width: 3 }),
    fill: new ol.style.Fill({ color: 'rgba(243, 139, 168, 0.3)' })
});

var drawLayer = new ol.layer.Vector({
    source: drawSource,
    style: function(feature) {
        return feature.get('selected') ? drawStyleSelected : drawStyleDefault;
    }
});

document.addEventListener('keydown', function(e) {
    if (e.key === 'Control' || e.key === 'Meta') ctrlPressed = true;
    if (e.key === 'Escape') {
        if (currentMode !== 'select') {
            setMode('select');
        }
        clearSelection();
    }
    if (e.key === 'Delete' || e.key === 'Backspace') {
        if (selectedFeatures.getArray().some(function(f) { return f.get('isDrawn'); })) {
            e.preventDefault();
            deleteDrawn();
        }
    }
    if (e.key === '1') setMode('select');
    if (e.key === '2') setMode('rectangle');
    if (e.key === '3') setMode('circle');
    if (e.key === '4') setMode('line');
    if (e.key === '5') setMode('polygon');
    if ((e.key === 's' || e.key === 'S') && !e.ctrlKey && !e.metaKey) toggleSnap();
});
document.addEventListener('keyup', function(e) {
    if (e.key === 'Control' || e.key === 'Meta') ctrlPressed = false;
});

function addToSelection(features) {
    features.forEach(function(f) {
        if (!selectedFeatures.getArray().includes(f)) {
            selectedFeatures.push(f);
            f.set('selected', true);
        }
    });
}

function removeFromSelection(features) {
    features.forEach(function(f) {
        selectedFeatures.remove(f);
        f.set('selected', false);
    });
}

function replaceSelection(features) {
    selectedFeatures.forEach(function(f) { f.set('selected', false); });
    selectedFeatures.clear();
    features.forEach(function(f) {
        selectedFeatures.push(f);
        f.set('selected', true);
    });
}

function clearSelection() {
    selectedFeatures.forEach(function(f) { f.set('selected', false); });
    selectedFeatures.clear();
    vectorLayer.changed();
    drawLayer.changed();
    onSelectionChanged();
}

function setMode(mode) {
    if (mode === currentMode && mode !== 'select') {
        mode = 'select';
    }
    currentMode = mode;

    Object.keys(drawInteractions).forEach(function(key) {
        drawInteractions[key].setActive(false);
    });

    var isDrawMode = (mode !== 'select');
    selectClick.setActive(!isDrawMode);
    dragBox.setActive(!isDrawMode);

    if (isDrawMode && drawInteractions[mode]) {
        drawInteractions[mode].setActive(true);
    }

    document.querySelectorAll('.tool-btn[data-mode]').forEach(function(btn) {
        if (btn.dataset.mode === 'snap' || btn.dataset.mode === 'delete') return;
        btn.classList.toggle('active', btn.dataset.mode === mode);
    });
}

function deleteDrawn() {
    var drawn = selectedFeatures.getArray().filter(function(f) { return f.get('isDrawn'); });
    if (drawn.length === 0) return;
    drawn.forEach(function(f) {
        selectedFeatures.remove(f);
        drawSource.removeFeature(f);
    });
    drawLayer.changed();
    onSelectionChanged();
}

function onSelectionChanged() {
    var features = selectedFeatures.getArray();
    var count = features.length;

    var hasDrawn = count > 0 && features.some(function(f) { return f.get('isDrawn'); });
    modifyInteraction.setActive(hasDrawn);
    translateInteraction.setActive(hasDrawn);

    if (count === 0) {
        clearInspect();
        return;
    }

    var drawnFeatures = features.filter(function(f) { return f.get('isDrawn'); });
    var gdsFeatures = features.filter(function(f) { return !f.get('isDrawn'); });

    if (drawnFeatures.length > 0 && gdsFeatures.length === 0) {
        if (drawnFeatures.length === 1) {
            showDrawnInspect(drawnFeatures[0]);
        } else {
            showDrawnMultiInspect(drawnFeatures);
        }
    } else if (drawnFeatures.length === 0) {
        if (gdsFeatures.length === 1) {
            showInspect(gdsFeatures[0]);
        } else {
            showMultiInspect(gdsFeatures);
        }
    } else {
        showMixedInspect(gdsFeatures, drawnFeatures);
    }
}

function showMultiInspect(features) {
    var panel = document.getElementById('info-panel');
    panel.innerHTML = '';

    var countDiv = document.createElement('div');
    countDiv.className = 'kv';
    countDiv.innerHTML = '<span class="key">selected</span><span class="val">Selected: ' + features.length + ' components</span>';
    panel.appendChild(countDiv);

    if (features.length > 50) {
        var warn = document.createElement('div');
        warn.className = 'kv';
        warn.innerHTML = '<span class="key"></span><span class="val hl">Large selection (' + features.length + ' components). Performance may be affected.</span>';
        panel.appendChild(warn);
    }

    var fileMap = {};
    features.forEach(function(f) {
        var prov = f.get('provenance') || {};
        if (prov.file && prov.line) {
            var filePath = prov.file.replace(/\\/g, '/');
            if (!fileMap[filePath]) fileMap[filePath] = [];
            var ln = parseInt(prov.line);
            if (fileMap[filePath].indexOf(ln) === -1) fileMap[filePath].push(ln);
        }
    });

    addSep(panel);

    var fileKeys = Object.keys(fileMap);
    if (fileKeys.length > 0) {
        addKV(panel, 'files', fileKeys.length + ' file(s) with provenance');
        fileKeys.forEach(function(fp) {
            var base = fp.split('/').pop();
            addKV(panel, '', base + ': lines [' + fileMap[fp].sort(function(a,b){return a-b;}).join(', ') + ']');
        });
    } else {
        addKV(panel, 'provenance', 'No provenance data in selection');
    }

    // Build component list with bbox
    var componentList = [];
    features.forEach(function(f, idx) {
        var meta = f.get('meta') || {};
        var bbox = meta.bbox || [];
        var prov = f.get('provenance') || {};
        componentList.push({
            idx: idx + 1,
            file: prov.file || '',
            line: prov.line ? parseInt(prov.line) : null,
            bbox: bbox
        });
    });

    // Sort by line number (nulls go to end)
    componentList.sort(function(a, b) {
        if (a.line === null && b.line === null) return a.idx - b.idx;
        if (a.line === null) return 1;
        if (b.line === null) return -1;
        return a.line - b.line;
    });

    // Display each component with bbox
    if (componentList.length > 0) {
        addSep(panel);
        addKV(panel, 'components', componentList.length + ' component(s)');
        componentList.forEach(function(comp) {
            var bboxStr = '[' + comp.bbox.map(function(v) { return v.toFixed(4); }).join(', ') + ']';
            if (comp.file && comp.line) {
                var base = comp.file.split('/').pop();
                addKV(panel, '', base + ' Component ' + comp.idx + ': Line ' + comp.line + ', bbox:' + bboxStr);
            } else {
                addKV(panel, '', 'Component ' + comp.idx + ', bbox:' + bboxStr);
            }
        });
    }

    addSep(panel);
    addKV(panel, 'repo', repo);
    addKV(panel, 'ref', branch);
    addKV(panel, 'path', currentFilePath);

    updateMultiSourcePanel(fileMap);
}

function updateMultiSourcePanel(fileMap) {
    var panel = document.getElementById('source-panel');
    panel.innerHTML = '';

    var fileKeys = Object.keys(fileMap);
    if (fileKeys.length === 0) {
        panel.innerHTML = '<p class="placeholder">No provenance data in selection</p>';
        return;
    }

    fileKeys.forEach(function(fp) {
        var section = document.createElement('div');
        section.className = 'file-section';
        section.setAttribute('data-file', fp);

        var base = fp.split('/').pop();
        var lines = fileMap[fp].sort(function(a,b){return a-b;});
        var isOpen = expandedFiles[fp] || false;

        var header = document.createElement('div');
        header.className = 'file-section-header';
        header.innerHTML = '<span class="arrow' + (isOpen ? ' open' : '') + '">&#9654;</span>'
            + '<span class="fname">' + esc(base) + '</span>'
            + '<span class="lines">lines [' + lines.join(', ') + ']</span>';

        var body = document.createElement('div');
        body.className = 'file-section-body' + (isOpen ? ' open' : '');

        header.onclick = (function(filePath, bodyEl) {
            return function() { toggleFileSection(filePath, bodyEl); };
        })(fp, body);

        if (isOpen) {
            loadFileSource(fp, body, lines);
        } else {
            body.innerHTML = '';
        }

        section.appendChild(header);
        section.appendChild(body);
        panel.appendChild(section);
    });
}

function toggleFileSection(filePath, bodyEl) {
    var isOpen = expandedFiles[filePath] || false;
    expandedFiles[filePath] = !isOpen;

    var section = bodyEl.parentElement;
    var arrow = section.querySelector('.arrow');
    if (!isOpen) {
        bodyEl.classList.add('open');
        arrow.classList.add('open');
        var linesText = section.querySelector('.lines').textContent;
        var match = linesText.match(/\[(.+)\]/);
        var lines = match ? match[1].split(', ').map(Number) : [];
        loadFileSource(filePath, bodyEl, lines);
    } else {
        bodyEl.classList.remove('open');
        arrow.classList.remove('open');
    }
}

function loadFileSource(filePath, container, highlightLines) {
    if (sourceCache[filePath]) {
        renderSourceLines(sourceCache[filePath], container, highlightLines);
        return;
    }

    container.innerHTML = '<p class="placeholder" style="padding:8px;">Loading...</p>';

    var url = '/source?repo=' + encodeURIComponent(repo) + '&ref=' + branch
        + '&path=' + encodeURIComponent(filePath);

    fetch(url).then(function(r) {
        if (!r.ok) throw Error('HTTP ' + r.status);
        return r.text();
    }).then(function(code) {
        sourceCache[filePath] = code;
        renderSourceLines(code, container, highlightLines);
    }).catch(function(e) {
        container.innerHTML = '<p class="placeholder">Failed to load source: ' + esc(e.message) + '</p>';
    });
}

function renderSourceLines(code, container, highlightLines) {
    var lines = code.split('\n');
    var html = '';
    for (var i = 0; i < lines.length; i++) {
        var ln = i + 1;
        var cls = highlightLines.indexOf(ln) !== -1 ? 'src-line hl' : 'src-line';
        html += '<div class="' + cls + '"><span class="ln">' + ln + '</span><span class="code">' + esc(lines[i]) + '</span></div>';
    }
    container.innerHTML = html;

    var firstHl = container.querySelector('.src-line.hl');
    if (firstHl) {
        firstHl.scrollIntoView({ block: 'center' });
    }
}

// GDS coordinates are in micrometers (μm).  Prevent OpenLayers from
// treating them as EPSG:4326 degrees and running them through the
// Web-Mercator forward transform, which distorts and clips small values.
var gdsGeoJsonFmt = new ol.format.GeoJSON({
    dataProjection: 'EPSG:3857',
    featureProjection: 'EPSG:3857',
});

var source = new ol.source.Vector();

// Highlight style for selected feature
var highlightStyle = new ol.style.Style({
    stroke: new ol.style.Stroke({ color: '#ffffff', width: 3 }),
    fill: new ol.style.Fill({ color: 'rgba(255,255,255,0.3)' })
});

var vectorLayer = new ol.layer.Vector({
    source: source,
    style: function(feature) {
        var selected = feature.get('selected');
        if (selected) return highlightStyle;
        var color = feature.get('color') || '#fff';
        var visible = feature.get('visible') !== false;
        if (!visible) return new ol.style.Style({});
        return new ol.style.Style({
            stroke: new ol.style.Stroke({ color: color, width: 1 }),
            fill: new ol.style.Fill({ color: color + '80' })
        });
    }
});

var map = new ol.Map({
    target: 'map',
    layers: [vectorLayer, drawLayer],
    view: new ol.View({ center: [0, 0], zoom: 2, minZoom: -20, maxZoom: 40 }),
    controls: [new ol.control.Zoom()]
});

// Select interaction — multi-select capable
var selectClick = new ol.interaction.Select({
    layers: [vectorLayer, drawLayer],
    style: null,  // use layer style function
    multi: true
});
map.addInteraction(selectClick);

selectClick.on('select', function(e) {
    var clicked = e.selected.length > 0 ? e.selected[0] : null;

    if (clicked) {
        var alreadySelected = selectedFeatures.getArray().includes(clicked);
        if (ctrlPressed) {
            if (alreadySelected) {
                removeFromSelection([clicked]);
            } else {
                addToSelection([clicked]);
            }
        } else {
            replaceSelection([clicked]);
        }
    } else {
        clearSelection();
        return;
    }

    selectClick.getFeatures().clear();
    vectorLayer.changed();
    drawLayer.changed();
    onSelectionChanged();
});

// DragBox interaction for area selection
var dragBox = new ol.interaction.DragBox({
    condition: function(mapBrowserEvent) {
        return ol.events.condition.mouseActionButton(mapBrowserEvent) &&
               ol.events.condition.noModifierKeys(mapBrowserEvent) ||
               ol.events.condition.platformModifierKeyOnly(mapBrowserEvent);
    }
});
map.addInteraction(dragBox);

var dragStartPixel = null;

dragBox.on('boxstart', function(e) {
    dragStartPixel = e.mapBrowserEvent.pixel;
});

dragBox.on('boxend', function(e) {
    var extent = dragBox.getGeometry().getExtent();
    var endPixel = e.mapBrowserEvent.pixel;
    var dragDist = Math.sqrt(
        Math.pow(endPixel[0] - dragStartPixel[0], 2) +
        Math.pow(endPixel[1] - dragStartPixel[1], 2)
    );

    if (dragDist < 5) return;

    var featuresInBox = [];
    source.forEachFeatureInExtent(extent, function(f) {
        if (f.get('visible') !== false) {
            var geom = f.getGeometry();
            if (geom && ol.extent.intersects(extent, geom.getExtent())) {
                featuresInBox.push(f);
            }
        }
    });
    drawSource.forEachFeatureInExtent(extent, function(f) {
        var geom = f.getGeometry();
        if (geom && ol.extent.intersects(extent, geom.getExtent())) {
            featuresInBox.push(f);
        }
    });

    if (ctrlPressed) {
        addToSelection(featuresInBox);
    } else {
        replaceSelection(featuresInBox);
    }

    vectorLayer.changed();
    drawLayer.changed();
    onSelectionChanged();
});

// --- Draw interactions ---
var drawRectangle = new ol.interaction.Draw({
    source: drawSource,
    type: 'Circle',
    geometryFunction: ol.interaction.Draw.createBox()
});
drawRectangle.setActive(false);
map.addInteraction(drawRectangle);
drawInteractions['rectangle'] = drawRectangle;

var drawCircle = new ol.interaction.Draw({
    source: drawSource,
    type: 'Circle'
});
drawCircle.setActive(false);
map.addInteraction(drawCircle);
drawInteractions['circle'] = drawCircle;

var drawLine = new ol.interaction.Draw({
    source: drawSource,
    type: 'LineString'
});

function toggleSnap() {
    snapActive = !snapActive;
    snapGds.setActive(snapActive);
    snapDraw.setActive(snapActive);
    snapGrid.setActive(snapActive);

    var btn = document.querySelector('.tool-btn[data-mode="snap"]');
    btn.classList.toggle('active', snapActive);

    if (snapActive) {
        updateGridSnap();
    } else {
        gridSource.clear();
    }
}

function updateGridSnap() {
    if (!snapActive) return;

    var view = map.getView();
    var resolution = view.getResolution();
    var extent = view.calculateExtent(map.getSize());

    var rawSpacing = resolution * 80;
    var exponent = Math.floor(Math.log10(rawSpacing));
    var spacing = Math.pow(10, exponent);

    var minX = Math.floor(extent[0] / spacing) * spacing;
    var minY = Math.floor(extent[1] / spacing) * spacing;
    var maxX = Math.ceil(extent[2] / spacing) * spacing;
    var maxY = Math.ceil(extent[3] / spacing) * spacing;

    var maxPoints = 2000;
    var countX = Math.round((maxX - minX) / spacing) + 1;
    var countY = Math.round((maxY - minY) / spacing) + 1;
    if (countX * countY > maxPoints) return;

    gridSource.clear();
    for (var x = minX; x <= maxX; x += spacing) {
        for (var y = minY; y <= maxY; y += spacing) {
            var pt = new ol.Feature({ geometry: new ol.geom.Point([x, y]) });
            gridSource.addFeature(pt);
        }
    }
}

map.getView().on('change:resolution', function() {
    if (snapActive) updateGridSnap();
});
map.on('moveend', function() {
    if (snapActive) updateGridSnap();
});

function loadGDS(filePath, retries) {
    currentFilePath = filePath;
    retries = retries || 0;
    var pollParam = retries > 0 ? '&poll=1' : '';
    fetch('/data?repo=' + encodeURIComponent(repo) + '&ref=' + branch + '&path=' + encodeURIComponent(filePath) + pollParam)
        .then(function(r) {
            if (r.status === 202) {
                // Still building — poll
                if (retries < 30) {
                    showBuilding(retries + 1);
                    setTimeout(function() { loadGDS(filePath, retries + 1); }, 2000);
                } else {
                    console.error('Build timeout for ' + filePath);
                }
                return null;
            }
            if (r.status === 404 && retries === 0) {
                // File not found on first attempt — retry with poll to trigger build
                showBuilding(1);
                setTimeout(function() { loadGDS(filePath, 1); }, 2000);
                return null;
            }
            if (!r.ok) throw Error('HTTP ' + r.status);
            return r.json();
        })
        .then(function(geojson) {
            if (!geojson) return;
            hideBuilding();
            source.clear();
            allFeatures = [];
            layerColors = {};
            sourceCache = {};
            expandedFiles = {};
            geojson.features.forEach(function(feature) {
                var props = feature.properties || {};
                var layerId = props.layer;
                var dataType = props.data_type;
                var color = props.color;
                var key = layerId + '/' + dataType;
                layerColors[key] = color;
                var geom = gdsGeoJsonFmt.readGeometry(feature.geometry);
                var f = new ol.Feature({ geometry: geom });
                f.set('layer', key);
                f.set('color', color);
                f.set('layerKey', key);
                f.set('visible', true);
                f.set('selected', false);
                f.set('provenance', props.provenance || {});
                f.set('meta', {
                    area_um2: props.area_um2,
                    vertex_count: props.vertex_count,
                    bbox: props.bbox || []
                });
                allFeatures.push(f);
                source.addFeature(f);
            });
            if (allFeatures.length > 0) fitView();
            clearInspect();
            buildLegend();
        }).catch(function(e) { console.error('Load failed: ' + e.message); });
}

function polyMeta(ring) {
    var xs = ring.map(function(p) { return p[0]; });
    var ys = ring.map(function(p) { return p[1]; });
    var area = 0;
    for (var i = 0; i < xs.length - 1; i++) area += xs[i] * ys[i+1] - xs[i+1] * ys[i];
    area = Math.abs(area) / 2;
    return {
        area_um2: Math.round(area * 1e4) / 1e4,
        vertex_count: ring.length - 1,
        bbox: [min(xs), min(ys), max(xs), max(ys)]
    };
}

function min(arr) { return arr.reduce(function(a, b) { return Math.min(a, b); }); }
function max(arr) { return arr.reduce(function(a, b) { return Math.max(a, b); }); }

        row.innerHTML = '<span class="swatch" style="background:' + layerColors[key] + ';" data-key="' + key + '"></span> ' + key;
        row.onclick = function() {

    document.getElementById('sidebar').appendChild(div);
}

function frag() { return document.createDocumentFragment(); }
function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function getShapeGeom(feature) {
    var type = feature.get('shapeType');
    var geom = feature.getGeometry();
    var result = { type: type };

    if (type === 'rectangle' || type === 'polygon') {
        var coords = geom.getCoordinates()[0];
        result.coordinates = coords.slice(0, -1).map(function(c) { return [Math.round(c[0] * 100) / 100, Math.round(c[1] * 100) / 100]; });
        var ext = geom.getExtent();
        result.bbox = [Math.round(ext[0] * 100) / 100, Math.round(ext[1] * 100) / 100, Math.round(ext[2] * 100) / 100, Math.round(ext[3] * 100) / 100];
        result.width = Math.round((ext[2] - ext[0]) * 100) / 100;
        result.height = Math.round((ext[3] - ext[1]) * 100) / 100;
        result.center = [Math.round((ext[0] + ext[2]) / 2 * 100) / 100, Math.round((ext[1] + ext[3]) / 2 * 100) / 100];
        var area = 0;
        for (var i = 0; i < coords.length - 1; i++) {
            area += coords[i][0] * coords[i + 1][1] - coords[i + 1][0] * coords[i][1];
        }
        result.area = Math.round(Math.abs(area) / 2 * 100) / 100;
    } else if (type === 'circle') {
        var center = geom.getCenter();
        var radius = geom.getRadius();
        result.center = [Math.round(center[0] * 100) / 100, Math.round(center[1] * 100) / 100];
        result.radius = Math.round(radius * 100) / 100;
        result.bbox = [
            Math.round((center[0] - radius) * 100) / 100,
            Math.round((center[1] - radius) * 100) / 100,
            Math.round((center[0] + radius) * 100) / 100,
            Math.round((center[1] + radius) * 100) / 100
        ];
    } else if (type === 'line') {
        var coords = geom.getCoordinates();
        result.coordinates = coords.map(function(c) { return [Math.round(c[0] * 100) / 100, Math.round(c[1] * 100) / 100]; });
        var len = 0;
        for (var i = 1; i < coords.length; i++) {
            var dx = coords[i][0] - coords[i - 1][0];
            var dy = coords[i][1] - coords[i - 1][1];
            len += Math.sqrt(dx * dx + dy * dy);
        }
        result.length = Math.round(len * 100) / 100;
    }

    return result;
}

function copyYAML(e) {
    e.stopPropagation();
    var features = selectedFeatures.getArray();
    if (features.length === 0) return;

    var drawnFeatures = features.filter(function(f) { return f.get('isDrawn'); });
    var gdsFeatures = features.filter(function(f) { return !f.get('isDrawn'); });

    var lines = [];

    if (gdsFeatures.length > 0) {
        if (gdsFeatures.length === 1 && drawnFeatures.length === 0) {
            var f = gdsFeatures[0];
            var layer = f.get('layer') || '?';
            var provenance = f.get('provenance') || {};
            var meta = f.get('meta') || {};
            var bbox = (meta.bbox || []).map(function(v) { return v.toFixed(4); });

            lines = [
                'layer: ' + layer,
                'area_um2: ' + (meta.area_um2 || ''),
                'bbox: [' + bbox.join(', ') + ']',
                'vertex_count: ' + (meta.vertex_count || ''),
                'repo: ' + repo,
                'ref: ' + branch,
                'path: ' + currentFilePath
            ];
            if (Object.keys(provenance).length > 0) {
                lines.push('');
                if (provenance.instance_name) lines.push('instance_name: ' + provenance.instance_name);
                if (provenance.cell) lines.push('cell: ' + provenance.cell);
                if (provenance.file) lines.push('file: ' + provenance.file);
                if (provenance.line) lines.push('line: ' + provenance.line);
                if (provenance.function && provenance.function !== '<module>') lines.push('function: ' + provenance.function);
                if (provenance.class_name) lines.push('class_name: ' + provenance.class_name);
                if (provenance.call_index) lines.push('call_index: ' + provenance.call_index);
            }
        } else {
            var fileMap = {};
            gdsFeatures.forEach(function(f) {
                var prov = f.get('provenance') || {};
                if (prov.file && prov.line) {
                    var fp = prov.file.replace(/\\/g, '/');
                    if (!fileMap[fp]) fileMap[fp] = [];
                    var ln = parseInt(prov.line);
                    if (fileMap[fp].indexOf(ln) === -1) fileMap[fp].push(ln);
                }
            });
            if (Object.keys(fileMap).length > 0) {
                lines.push('modifications:');
                Object.keys(fileMap).sort().forEach(function(fp) {
                    var sorted = fileMap[fp].sort(function(a, b) { return a - b; });
                    lines.push('  - file: ' + fp);
                    lines.push('    lines: [' + sorted.join(', ') + ']');
                });
            }
        }
    }

    if (drawnFeatures.length > 0) {
        if (lines.length > 0) lines.push('');
        if (drawnFeatures.length === 1 && gdsFeatures.length === 0) {
            var sg = getShapeGeom(drawnFeatures[0]);
            lines = lines.concat(shapeToYAML(sg));
        } else {
            lines.push('annotations:');
            drawnFeatures.forEach(function(f) {
                var sg = getShapeGeom(f);
                lines.push('  - shape: ' + sg.type);
                if (sg.bbox) lines.push('    bbox: ' + JSON.stringify(sg.bbox));
                if (sg.width !== undefined) lines.push('    width: ' + sg.width);
                if (sg.height !== undefined) lines.push('    height: ' + sg.height);
                if (sg.center) lines.push('    center: ' + JSON.stringify(sg.center));
                if (sg.radius !== undefined) lines.push('    radius: ' + sg.radius);
                if (sg.length !== undefined) lines.push('    length: ' + sg.length);
                if (sg.area !== undefined) lines.push('    area: ' + sg.area);
            });
        }
    }

    if (lines.length === 0) {
        lines = ['# No data to copy'];
    }

    copyToClipboard(lines.join('\n'));
}

function copyToClipboard(text) {
    var btn = document.getElementById('copy-btn');
    // Try modern Clipboard API first
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(function() { btn.textContent = 'Copy YAML'; btn.classList.remove('copied'); }, 2000);
        }).catch(function(err) {
            console.error('Clipboard API failed:', err);
            fallbackCopy(text, btn);
        });
    } else {
        fallbackCopy(text, btn);
    }
}

function fallbackCopy(text, btn) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    try {
        var ok = document.execCommand('copy');
        if (ok) {
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
        } else {
            btn.textContent = 'Failed';
        }
    } catch (e) {
        console.error('execCommand copy failed:', e);
        btn.textContent = 'Failed';
        // Last resort: show YAML in a prompt for manual copy
        showYamlPrompt(text);
    }
    document.body.removeChild(ta);
    setTimeout(function() { btn.textContent = 'Copy YAML'; btn.classList.remove('copied'); }, 2000);
}

function showYamlPrompt(text) {
    // Show YAML in the info panel as a selectable textarea
    var body = document.getElementById('info-panel');
    var pre = document.createElement('div');
    pre.style.cssText = 'background:#1e1e2e;padding:8px;border-radius:4px;margin-top:4px;white-space:pre-wrap;font:12px monospace;color:#cdd6f4;max-height:200px;overflow-y:auto;';
    pre.textContent = text;
    pre.setAttribute('contenteditable', 'false');
    var note = document.createElement('p');
    note.style.cssText = 'color:#f9e2af;font-size:11px;margin-top:4px;';
    note.textContent = 'Auto-copy blocked by browser. Select the text above and Ctrl+C to copy.';
    body.appendChild(pre);
    body.appendChild(note);
    setTimeout(function() {
        if (pre.parentNode) pre.parentNode.removeChild(pre);
        if (note.parentNode) note.parentNode.removeChild(note);
    }, 15000);
}

                document.querySelectorAll('.file-item.active').forEach(function(el) { el.classList.remove('active'); });
                div.classList.add('active');
                // If file is building, start polling immediately
                loadGDS(fname, isBuilding ? 1 : 0);
            };
            list.appendChild(div);
            if (hasProv && !firstProv) firstProv = div;
            if (!firstAny) firstAny = div;
        });
        var auto = firstProv || firstAny;
        if (auto) setTimeout(function() { auto.click(); }, 200);
    }).catch(function(e) { console.error('File list failed: ' + e.message); });
</script>
</body>
</html>
